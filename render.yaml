# Render Blueprint — serves the static SvelteKit SPA. The online store is Convex,
# which runs on Convex's own cloud (NOT on Render). One build command both deploys
# the Convex functions to your PROD deployment and builds the frontend with the
# prod Convex URL inlined.
#
# Use it: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Before the first deploy, set CONVEX_DEPLOY_KEY in the Render dashboard (generate
# it at Convex dashboard → Project → Settings → Generate Production Deploy Key).
# Docs: https://render.com/docs/blueprint-spec · https://docs.convex.dev/production/hosting/
services:
  # --- Frontend (SvelteKit static SPA) ------------------------------------
  - type: web
    name: inventory-frontend
    runtime: static
    plan: free
    # `convex deploy` pushes functions to the prod deployment (keyed by
    # CONVEX_DEPLOY_KEY), then runs --cmd with PUBLIC_CONVEX_URL set to that
    # deployment's URL — so the Vite build inlines the right URL automatically.
    buildCommand: npm install && npx convex deploy --cmd 'npm run build' --cmd-url-env-var-name PUBLIC_CONVEX_URL
    staticPublishPath: build
    envVars:
      # Secret. From Convex dashboard → Settings → Generate Production Deploy Key.
      - key: CONVEX_DEPLOY_KEY
        sync: false
      # NOTE: do NOT set PUBLIC_CONVEX_URL here — the build command injects it.
    routes:
      # SPA fallback: every path serves index.html so client-side routing works.
      - type: rewrite
        source: /*
        destination: /index.html
