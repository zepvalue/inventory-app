# Render Blueprint — deploys the static SvelteKit SPA. The online store is now
# Convex (deployed separately with `npx convex deploy`, not on Render).
# Use it: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Docs: https://render.com/docs/blueprint-spec
services:
  # --- Frontend (SvelteKit static SPA) ------------------------------------
  - type: web
    name: inventory-frontend
    runtime: static
    plan: free
    # PUBLIC_ vars are inlined at build time, so build AFTER deploying Convex and
    # set PUBLIC_CONVEX_URL below. `convex deploy` can also run the frontend build:
    #   buildCommand: npx convex deploy --cmd 'npm install && npm run build'
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      # Your Convex production deployment URL (https://<name>-<id>.convex.cloud).
      - key: PUBLIC_CONVEX_URL
        sync: false
    routes:
      # SPA fallback: every path serves index.html so client-side routing works.
      - type: rewrite
        source: /*
        destination: /index.html
